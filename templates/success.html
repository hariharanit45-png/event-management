<title>REG</title>
<!DOCTYPE html>
<html>
<head>
    <title>Registration Successful</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins', sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: radial-gradient(circle at center, #1cc88a, #4e73df, #2c3e50);
            overflow:hidden;
            position:relative;
        }

        /* Firework Animation */
        .firework{
            position:absolute;
            width:5px;
            height:5px;
            background:white;
            border-radius:50%;
            animation: explode 1.5s infinite ease-out;
        }

        @keyframes explode{
            0%{
                transform: scale(1);
                opacity:1;
            }
            100%{
                transform: scale(20);
                opacity:0;
            }
        }

        /* Multiple fireworks */
        .firework:nth-child(1){ top:20%; left:30%; background:#ff4e50; animation-delay:0s;}
        .firework:nth-child(2){ top:40%; left:70%; background:#f9d423; animation-delay:0.5s;}
        .firework:nth-child(3){ top:70%; left:20%; background:#1cc88a; animation-delay:1s;}
        .firework:nth-child(4){ top:60%; left:80%; background:#00f2fe; animation-delay:1.5s;}

        /* Success Card */
        .success-box{
            background:rgba(255,255,255,0.15);
            backdrop-filter:blur(20px);
            padding:50px;
            width:450px;
            border-radius:20px;
            text-align:center;
            box-shadow:0 20px 50px rgba(0,0,0,0.4);
            color:white;
            animation:fadeIn 1s ease-in-out;
        }

        @keyframes fadeIn{
            from{opacity:0; transform:translateY(30px);}
            to{opacity:1; transform:translateY(0);}
        }

        .checkmark{
            font-size:70px;
            color:#00ff9d;
            margin-bottom:20px;
            animation:bounce 1s ease infinite alternate;
        }

        @keyframes bounce{
            from{transform:translateY(0);}
            to{transform:translateY(-10px);}
        }

        h2{
            font-weight:600;
            margin-bottom:10px;
        }

        p{
            font-size:15px;
            margin-bottom:30px;
            opacity:0.9;
        }

        .btn{
            display:inline-block;
            padding:12px 28px;
            background:linear-gradient(90deg,#1cc88a,#4e73df);
            border-radius:30px;
            text-decoration:none;
            color:white;
            font-weight:600;
            transition:0.3s;
        }

        .btn:hover{
            transform:scale(1.1);
            box-shadow:0 0 25px rgba(28,200,138,0.9);
        }

        /* Floating Confetti */
        .confetti{
            position:absolute;
            width:8px;
            height:8px;
            background:#fff;
            opacity:0.7;
            animation: fall 5s linear infinite;
        }

        @keyframes fall{
            from{transform:translateY(-100px) rotate(0deg);}
            to{transform:translateY(100vh) rotate(360deg);}
        }

        .confetti:nth-child(5){left:10%; background:#ff4e50; animation-delay:0s;}
        .confetti:nth-child(6){left:30%; background:#f9d423; animation-delay:1s;}
        .confetti:nth-child(7){left:50%; background:#1cc88a; animation-delay:2s;}
        .confetti:nth-child(8){left:70%; background:#00f2fe; animation-delay:3s;}
        .confetti:nth-child(9){left:90%; background:#ff00cc; animation-delay:4s;}

        @media(max-width:480px){
            .success-box{
                width:90%;
                padding:35px;
            }
        }

    </style>
</head>

<body>

<!-- Fireworks -->
<div class="firework"></div>
<div class="firework"></div>
<div class="firework"></div>
<div class="firework"></div>

<!-- Confetti -->
<div class="confetti"></div>
<div class="confetti"></div>
<div class="confetti"></div>
<div class="confetti"></div>
<div class="confetti"></div>

<div class="success-box">
    <div class="checkmark">🎉</div>

    <h2>Registration Successful!</h2>

    <p>
        Congratulations! You are officially registered for<br>
        <strong>{{ event[1] }}</strong>
    </p>

    <a href="/events" class="btn">Back to Events</a>
</div>

</body>
</html>
