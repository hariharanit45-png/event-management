<!DOCTYPE html>
<html>
<head>
    <title>Sign In / Login - Event Management System</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4e73df, #1cc88a);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            width: 800px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            display: flex;
            overflow: hidden;
        }

        .form-section {
            flex: 1;
            padding: 40px;
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #4e73df;
        }

        h3 {
            margin-bottom: 15px;
            color: #333;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0 15px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 25px;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        .signup-btn {
            background: #1cc88a;
            color: white;
        }

        .login-btn {
            background: #4e73df;
            color: white;
        }

        button:hover {
            opacity: 0.9;
            transform: scale(1.03);
        }

        .divider {
            width: 2px;
            background: #eee;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- SIGN UP -->
    <div class="form-section">
        <h2>Event Management System</h2>
        <h3>New User - Sign Up</h3>

        <form method="POST" action="/signup">
            <input type="text" name="name" placeholder="Full Name" required>
            <input type="email" name="email" placeholder="Email Address" required>
            <input type="password" name="password" placeholder="Password" required>

            <button type="submit" class="signup-btn">Sign Up</button>
        </form>
    </div>

    <div class="divider"></div>

    <!-- LOGIN -->
    <div class="form-section">
        <h2>&nbsp;</h2>
        <h3>Already Registered - Login</h3>

        <form method="POST" action="/login">
            <input type="email" name="email" placeholder="Email Address" required>
            <input type="password" name="password" placeholder="Password" required>

            <button type="submit" class="login-btn">Login</button>
        </form>
    </div>

</div>

</body>
</html>
