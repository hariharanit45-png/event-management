<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Login - EMS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Orbitron:wght@500&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
 
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: url("{{ url_for('static', filename='back.png') }}") no-repeat center center/cover;
            position: relative;
        }

        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(4px);
        }

        .login-container {
            position: relative;
            width: 450px;
            padding: 50px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
            color: white;
            animation: fadeIn 1s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            font-size: 45px;
            margin-bottom: 10px;
        }

        .main-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .tagline {
            font-family: 'Playfair Display', serif;
            font-size: 15px;
            margin-bottom: 25px;
            opacity: 0.9;
        }

        .highlight {
            color: #1cc88a;
            font-weight: 600;
        }

        .event-info {
            font-size: 13px;
            margin-bottom: 25px;
            line-height: 1.6;
            opacity: 0.85;
        }

        .input-group {
            margin-bottom: 22px;
            text-align: left;
        }

        .input-group label {
            font-size: 13px;
            margin-bottom: 6px;
            display: block;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            outline: none;
            background: rgba(255,255,255,0.9);
            transition: 0.3s;
        }

        .input-group input:focus {
            box-shadow: 0 0 12px #1cc88a;
        }

        .login-btn {
            width: 100%;
            padding: 13px;
            border-radius: 30px;
            border: none;
            background: linear-gradient(90deg, #1cc88a, #4e73df);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
            box-shadow: 0 0 20px rgba(28,200,138,0.5);
        }

        .login-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(28,200,138,0.9);
        }

        .extra-links {
            margin-top: 20px;
            font-size: 14px;
        }

        .extra-links a {
            color: #ffffff;
            text-decoration: none;
            font-weight: 500;
        }

        .extra-links a:hover {
            color: #1cc88a;
        }
    </style>
</head>

<body>

<div class="login-container">

    <div class="logo">🚀</div>

    <div class="main-title">Event Management System</div>

    <div class="tagline">
        Unlock Your <span class="highlight">Future Opportunities</span>
    </div>

    <div class="event-info">
        Join exciting events like <span class="highlight">AI Workshop</span>,
        <span class="highlight">Hackathon</span>,
        <span class="highlight">Cyber Security Talk</span>,
        and many more.
        <br><br>
        Register, participate, and enhance your technical skills with industry-driven sessions.
    </div>

    <form method="POST">
        <div class="input-group">
            <label>Email Address</label>
            <input type="email" name="email" required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" name="password" required>
        </div>

        <button type="submit" class="login-btn">Login</button>
    </form>

    <div class="extra-links">
        <p>New user? <a href="/register">Create Account</a></p>
    </div>

</div>

</body>
</html>
