<!DOCTYPE html>
<html>
<head>
    <title>Login Failed</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #ff416c, #ff4b2b);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .box {
            background: white;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        h2 {
            color: #ff4b2b;
        }

        p {
            margin: 15px 0;
            color: #555;
        }

        a {
            text-decoration: none;
            background: #ff4b2b;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            display: inline-block;
            margin-top: 10px;
        }

        a:hover {
            background: #ff2e00;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>❌ Invalid Login</h2>
    <p>Email or password is incorrect.</p>
    <a href="/login">Try Again</a>
</div>

</body>
</html>
