<!DOCTYPE html>
<html>
<head>
    <title>Registration Successful</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #4e73df, #1cc88a);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .success-box {
            background: white;
            padding: 50px;
            width: 420px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        .checkmark {
            font-size: 60px;
            color: #1cc88a;
            margin-bottom: 20px;
        }

        h2 {
            color: #4e73df;
            margin-bottom: 10px;
        }

        p {
            color: #555;
            font-size: 15px;
            margin-bottom: 30px;
        }

        .btn {
            display: inline-block;
            padding: 10px 25px;
            background: #4e73df;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            background: #2e59d9;
            transform: scale(1.05);
        }
    </style>
</head>

<body>

<div class="success-box">
    <div class="checkmark">✔</div>

    <h2>Registration Successful!</h2>

    <p>
        You have successfully registered for<br>
        <strong>{{ event[1] }}</strong>
    </p>

    <a href="/events" class="btn">Back to Events</a>
</div>

</body>
</html>
